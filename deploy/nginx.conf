# /etc/nginx/sites-available/status  (symlink into sites-enabled/)
#
# Reverse proxy for the status dashboard on 127.0.0.1:3001.
# Replace status.mcnu.ro with your subdomain.

server {
    listen 80;
    listen [::]:80;
    server_name status.mcnu.ro;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name status.mcnu.ro;

    ssl_certificate     /etc/letsencrypt/live/status.mcnu.ro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/status.mcnu.ro/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
}
